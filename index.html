<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111111">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="שעות אימון">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>שעות אימון</title>
<style>
  :root {
    --bg: #111111; --bg2: #1a1a1a; --bg3: #222222;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
    --text: #f0f0f0; --text2: #999999; --text3: #555555; --accent: #ffffff;
    --green: #22c55e; --green-bg: rgba(34,197,94,0.12);
    --blue: #60a5fa; --blue-bg: rgba(96,165,250,0.12);
    --red: #f87171; --red-bg: rgba(248,113,113,0.12);
    --orange: #fb923c; --orange-bg: rgba(251,146,60,0.12);
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { scrollbar-gutter: stable; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Arial', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; min-height: 100dvh; }
  .app { max-width: 430px; margin: 0 auto; min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; position: relative; }

  /* SCREENS */
  .screen { display: none; flex: 1; flex-direction: column; padding-bottom: 88px; }
  .screen.active { display: flex; }

  /* HEADER */
  .header { padding: 56px 20px 16px; }
  .header h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
  .header p { font-size: 14px; color: var(--text2); margin-top: 4px; }

  /* CARDS */
  .card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin: 0 16px 12px; }
  .card-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 12px; }

  /* INPUTS */
  input[type="text"], input[type="number"], input[type="password"], input[type="email"], input[type="date"], input[type="time"] {
    background: var(--bg3); border: 0.5px solid var(--border);
    border-radius: var(--radius-sm); padding: 9px 12px;
    font-size: 14px; color: var(--text); font-family: inherit; width: 100%;
  }
  input:focus { outline: none; border-color: var(--border2); }
  select { background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 14px; color: var(--text); font-family: inherit; width: 100%; }
  select:focus { outline: none; border-color: var(--border2); }

  /* BUTTONS */
  .btn { width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; font-family: inherit; transition: opacity 0.15s; }
  .btn:active { opacity: 0.8; }
  .btn-primary { background: var(--accent); color: #111; }
  .btn-secondary { background: var(--bg3); color: var(--text); border: 0.5px solid var(--border); }
  .btn-danger { background: var(--red-bg); color: var(--red); border: 0.5px solid var(--red); }

  /* ERROR / SUCCESS */
  .error-box { background: var(--red-bg); color: var(--red); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13px; margin-top: 8px; display: none; }
  .success-box { background: var(--green-bg); color: var(--green); border: 0.5px solid var(--green); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13px; display: none; }

  /* SECTION DIVIDER */
  .section-divider { font-size: 13px; font-weight: 600; color: var(--text2); margin: 4px 16px 8px; padding-top: 4px; }

  /* EMPTY */
  .empty { text-align: center; color: var(--text2); font-size: 14px; padding: 24px 0; }

  /* BREAKDOWN */
  .breakdown-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 0.5px solid var(--border); }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-label { font-size: 14px; }
  .breakdown-val { font-size: 14px; font-weight: 500; }

  /* BOTTOM SHEET MODAL */
  .bottom-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 200; display: flex; align-items: flex-end; }
  .bottom-sheet { background: var(--bg2); border-radius: 16px 16px 0 0; width: 100%; max-width: 430px; margin: 0 auto; padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); max-height: 90vh; overflow-y: auto; }
  .sheet-title { font-size: 16px; font-weight: 600; margin-bottom: 14px; }

  /* BOTTOM NAV */
  .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(17,17,17,0.92); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-top: 0.5px solid var(--border); display: flex; padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); z-index: 100; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; color: var(--text3); padding: 6px 0; font-family: inherit; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-btn span { font-size: 10px; font-weight: 500; }

  /* VIEWING-AS BANNER */
  #view-banner { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; z-index: 150; background: var(--blue); color: #111; display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; font-size: 13px; font-weight: 600; box-sizing: border-box; }
  .app.viewing .header { padding-top: 96px; }

  /* TYPE TOGGLE */
  .type-toggle { display: flex; border: 0.5px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .type-btn { flex: 1; padding: 9px; font-size: 13px; font-weight: 500; border: none; background: var(--bg3); color: var(--text2); cursor: pointer; font-family: inherit; }
  .type-btn.act-private { background: var(--green); color: #111; }
  .type-btn.act-group { background: var(--blue); color: #111; }

  /* PLAYER CHIPS */
  .player-chips { display: flex; flex-wrap: wrap; gap: 6px; min-height: 10px; }
  .player-chip { display: inline-flex; align-items: center; gap: 4px; padding: 5px 10px; border-radius: 20px; font-size: 13px; background: var(--bg3); border: 0.5px solid var(--border); color: var(--text); }
  .player-chip .rm { cursor: pointer; opacity: 0.5; font-size: 15px; line-height: 1; }
  .player-chip .rm:active { opacity: 1; color: var(--red); }

  /* ATTENDANCE */
  .att-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 0.5px solid var(--border); }
  .att-row:last-child { border-bottom: none; }
  .att-bar { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .att-fill { height: 100%; background: var(--blue); border-radius: 2px; }

  /* RATES */
  .rate-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid var(--border); }
  .rate-row:last-child { border-bottom: none; }
  .rate-row label { flex: 1; font-size: 14px; }
  .rate-row input { width: 85px; text-align: right; }
  .rate-suffix { font-size: 13px; color: var(--text2); white-space: nowrap; }

  /* ─── CALENDAR ─── */
  .cal-toolbar { display: flex; flex-direction: column; gap: 8px; padding: 8px 16px 12px; }
  .cal-toolbar-nav { display: flex; align-items: center; height: 48px; }
  .cal-nav { background: none; border: none; color: var(--text2); font-size: 26px; cursor: pointer; padding: 8px 12px; line-height: 1; font-family: inherit; flex-shrink: 0; }
  .cal-nav:active { color: var(--text); }
  #cal-title { font-size: 16px; font-weight: 600; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 220px; flex-shrink: 0; }
  .cal-toolbar-controls { display: flex; align-items: center; gap: 8px; }
  .cal-view-toggle { display: flex; background: var(--bg3); border: 0.5px solid var(--border); border-radius: 20px; overflow: hidden; }
  .cal-view-btn { padding: 5px 12px; border: none; background: none; color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .cal-view-btn.active { background: var(--accent); color: #111; border-radius: 20px; }
  .cal-add-btn { background: var(--accent); color: #111; border: none; border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; margin-inline-start: auto; }
  .cal-add-btn:active { opacity: 0.8; }


  /* Month grid */
  .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: auto; grid-auto-rows: 1fr; height: calc(100dvh - 220px); gap: 1px; background: var(--border); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin: 0 16px 16px; }
  .month-day-header { background: var(--bg2); text-align: center; font-size: 11px; font-weight: 600; color: var(--text3); padding: 8px 2px; }
  .month-day { background: var(--bg2); min-height: 0; overflow: hidden; padding: 4px; cursor: pointer; position: relative; }
  .month-day:active { background: var(--bg3); }
  .month-day.today { background: rgba(255,255,255,0.04); }
  .month-day.other-month { opacity: 0.35; }
  .month-day-num { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 2px; }
  .month-day.today .month-day-num { color: var(--accent); font-weight: 700; }
  .month-chip { font-size: 10px; font-weight: 600; padding: 3px 6px; border-radius: 4px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .month-chip-private { background: rgba(34,197,94,0.25); color: #4ade80; border-left: 2px solid var(--green); }
  .month-chip-group { background: rgba(96,165,250,0.25); color: #93c5fd; border-left: 2px solid var(--blue); }
  .month-chip-cancelled { background: rgba(255,255,255,0.06); color: var(--text3); text-decoration: line-through; }
  .month-more { font-size: 10px; color: var(--text3); }
  .month-add-btn { position: absolute; bottom: 3px; left: 3px; background: none; border: none; color: var(--text3); font-size: 16px; cursor: pointer; line-height: 1; padding: 1px 3px; }
  html[dir="ltr"] .month-add-btn { left: auto; right: 3px; }

  /* Week / Day agenda */
  .week-day-block { margin: 0 16px 8px; }
  .week-day-header { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; padding: 4px 0; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .week-day-header.today { color: var(--accent); }

  /* Day time grid */
  .day-grid { margin: 0 16px 12px; position: relative; }
  .day-hour-row { display: flex; border-bottom: 0.5px solid var(--border); min-height: 52px; }
  .day-hour-label { font-size: 11px; color: var(--text3); width: 40px; flex-shrink: 0; padding-top: 4px; text-align: center; }
  html[dir="ltr"] .day-hour-label { text-align: left; padding-left: 4px; }
  .day-hour-content { flex: 1; position: relative; }

  /* Session cards (week/day view) */
  .session-card { background: rgba(96,165,250,0.15); border-inline-start: 3px solid var(--blue); border-top: 0.5px solid rgba(96,165,250,0.3); border-bottom: 0.5px solid rgba(96,165,250,0.3); border-inline-end: none; border-radius: 6px; padding: 8px 10px; margin: 2px 0; cursor: pointer; }
  .session-card:active { opacity: 0.8; }
  .session-card.private { background: rgba(34,197,94,0.15); border-inline-start-color: var(--green); border-top-color: rgba(34,197,94,0.3); border-bottom-color: rgba(34,197,94,0.3); }
  .session-card.cancelled { background: rgba(255,255,255,0.04); border-color: var(--border); opacity: 0.6; }
  .session-card-name { font-size: 14px; font-weight: 600; }
  .session-card-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .session-card-cancelled-badge { font-size: 10px; font-weight: 600; color: var(--red); background: var(--red-bg); padding: 2px 6px; border-radius: 10px; display: inline-block; margin-top: 3px; }
  .session-card-att-btn { font-size: 11px; color: var(--blue); margin-top: 4px; cursor: pointer; display: inline-block; }

  /* Session form fields */
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; display: block; font-weight: 500; }
  .form-group { margin-bottom: 12px; }
  .form-row { display: flex; gap: 10px; }
  .form-row > * { flex: 1; }

  /* Chips */
  .chip-group { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .chip { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; background: var(--bg3); border: 0.5px solid var(--border); color: var(--text2); cursor: pointer; font-family: inherit; }
  .chip.active { background: var(--accent); color: #111; border-color: var(--accent); }

  /* Add player row */
  .add-row { display: flex; gap: 8px; margin-top: 8px; }
  .add-row input { flex: 1; }
  .add-row button { padding: 9px 14px; background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 13px; cursor: pointer; white-space: nowrap; font-family: inherit; }
  .add-row button:active { opacity: 0.7; }

  /* ─── SIDEBAR NAV ─── */
  .sidebar-nav {
    display: none;
    flex-direction: column;
    width: 220px;
    flex-shrink: 0;
    background: var(--bg2);
    border-inline-end: 0.5px solid var(--border);
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 28px 20px 20px;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 8px;
  }
  .sidebar-logo-icon { font-size: 22px; line-height: 1; }
  .sidebar-logo-name { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .sidebar-items { flex: 1; display: flex; flex-direction: column; gap: 2px; padding: 8px; }
  .sidebar-nav-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 10px 12px;
    border: none;
    border-radius: var(--radius-sm);
    background: none;
    color: var(--text2);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    text-align: start;
    transition: background 0.12s, color 0.12s;
  }
  .sidebar-nav-btn:hover { background: var(--bg3); color: var(--text); }
  .sidebar-nav-btn.active { background: var(--bg3); color: var(--accent); }
  .sidebar-nav-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
  .sidebar-footer {
    padding: 16px 20px;
    border-top: 0.5px solid var(--border);
  }
  .sidebar-username {
    font-size: 13px;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ─── DESKTOP LAYOUT (≥880px) ─── */
  @media (min-width: 880px) {
    .app { max-width: 100%; flex-direction: row; }
    .month-grid { height: calc(100dvh - 180px); }
    html[dir="rtl"] .app { flex-direction: row-reverse; }
    html[dir="ltr"] .app { flex-direction: row; }

    .sidebar-nav { display: flex !important; }

    .nav { display: none !important; }

    .screen { flex: 1; min-width: 0; padding-bottom: 24px; overflow-y: auto; }
    .screen .header { padding-top: 32px; }
    .app.viewing .screen .header { padding-top: 72px; }
    /* Override global viewing header offset (was offset for fixed banner) */
    .app.viewing .header { padding-top: 32px; }

    .bottom-overlay { align-items: center; }
    .bottom-sheet { max-width: 520px; border-radius: 16px; }

    #view-banner { left: 220px; right: 0; transform: none; max-width: calc(100vw - 220px); }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ── AUTH SCREEN ── -->
  <div id="screen-auth" class="screen active" style="justify-content:center;align-items:center">
    <div style="width:100%;padding:40px 24px;max-width:400px">
      <div style="text-align:center;margin-bottom:32px">
        <div style="font-size:42px;margin-bottom:10px">🏃</div>
        <h1 style="font-size:26px;font-weight:600;letter-spacing:-0.5px" id="auth-title">שעות אימון</h1>
        <p style="font-size:14px;color:var(--text2);margin-top:6px" id="auth-subtitle">התחבר כדי להמשיך</p>
      </div>
      <div id="auth-error" class="error-box" style="margin-bottom:10px"></div>
      <div id="auth-success" class="success-box" style="margin-bottom:10px"></div>
      <div id="auth-name-row" style="display:none;margin-bottom:10px">
        <label class="form-label" id="lbl-fullname">שם מלא</label>
        <input type="text" id="auth-fullname" placeholder="השם המלא שלך" style="width:100%">
      </div>
      <div style="margin-bottom:10px">
        <label class="form-label" id="lbl-email">אימייל</label>
        <input type="email" id="auth-email" placeholder="כתובת אימייל" style="width:100%" dir="ltr">
      </div>
      <div style="margin-bottom:18px">
        <label class="form-label" id="lbl-password">סיסמה</label>
        <input type="password" id="auth-password" placeholder="סיסמה" style="width:100%" dir="ltr"
          onkeydown="if(event.key==='Enter')submitAuth()">
        <div id="auth-forgot-row" style="margin-top:6px;text-align:left">
          <button id="auth-forgot-btn" onclick="forgotPassword()" style="background:none;border:none;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;padding:0">שכחת סיסמה?</button>
        </div>
      </div>
      <button class="btn btn-primary" id="auth-submit-btn" onclick="submitAuth()" style="margin-top:0">התחבר</button>
      <button class="btn btn-secondary" id="auth-toggle-btn" style="margin-top:8px;font-size:13px" onclick="toggleAuthMode()">הרשמה כמאמן חדש</button>
      <button class="btn btn-secondary" id="auth-resend-btn" style="margin-top:8px;font-size:12px;display:none" onclick="resendVerification()">שלח שוב אימייל אימות</button>
    </div>
  </div>

  <!-- ── CALENDAR SCREEN ── -->
  <div id="screen-calendar" class="screen">
    <div class="header" style="padding-bottom:8px">
      <h1 id="app-header-title">שעות אימון</h1>
    </div>
    <div class="cal-toolbar">
      <div class="cal-toolbar-nav" style="position:relative">
        <div style="width:100%;display:flex;justify-content:center;align-items:center;gap:2px">
          <button class="cal-nav" onclick="calPrev()">‹</button>
          <span id="cal-title"></span>
          <button class="cal-nav" onclick="calNext()">›</button>
        </div>
        <button id="cal-today-chip" onclick="calJumpToday()" style="display:none;position:absolute;inset-inline-end:0;top:50%;transform:translateY(-50%);background:var(--bg3);border:0.5px solid var(--border2);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit;transition:opacity 0.15s"></button>
      </div>
      <div class="cal-toolbar-controls">
        <div class="cal-view-toggle">
          <button class="cal-view-btn active" id="cvb-month" onclick="setCalView('month')">חודש</button>
          <button class="cal-view-btn" id="cvb-week" onclick="setCalView('week')">שבוע</button>
          <button class="cal-view-btn" id="cvb-day" onclick="setCalView('day')">יום</button>
        </div>
        <button class="cal-add-btn admin-only" style="display:none" onclick="openSessionModal(null,null,null)" id="cal-add-btn">+ אימון</button>
      </div>
    </div>
    <div id="cal-today-strip"></div>
    <div id="cal-body"></div>
  </div>

  <!-- ── GROUPS SCREEN ── -->
  <div id="screen-groups" class="screen">
    <div class="header">
      <h1 id="groups-h1">שחקנים</h1>
      <p id="groups-subtitle">קבוצות ושחקנים פרטיים</p>
    </div>
    <div class="section-divider" id="groups-section-divider">קבוצות</div>
    <div id="groups-add-btn-row" style="padding:0 16px 4px;display:none">
      <button class="btn btn-primary" style="margin-top:0" id="groups-add-btn" onclick="openAddGroupModal()">+ קבוצה חדשה</button>
    </div>
    <div id="groups-list"></div>
    <div class="section-divider" id="individual-players-divider" style="margin-top:8px">שחקנים פרטיים</div>
    <div id="individual-players-add-row" style="padding:0 16px 4px;display:none">
      <button class="btn btn-secondary" style="margin-top:0" id="individual-add-btn" onclick="openAddIndividualPlayerModal()">+ שחקן חדש</button>
    </div>
    <div id="individual-players-list"></div>
  </div>

  <!-- ── SUMMARY SCREEN ── -->
  <div id="screen-summary" class="screen">
    <div class="header">
      <h1 id="summary-h1">סיכום</h1>
      <p id="summary-subtitle">שעות והכנסה</p>
    </div>
    <div id="summary-body"></div>
  </div>

  <!-- ── SETTINGS SCREEN ── -->
  <div id="screen-settings" class="screen">
    <div class="header">
      <h1 id="settings-h1">הגדרות</h1>
    </div>
    <div id="settings-body"></div>
  </div>

  <!-- ── ADMIN SCREEN ── -->
  <div id="screen-admin" class="screen">
    <div class="header">
      <h1 id="admin-h1">ניהול</h1>
      <p id="admin-subtitle">מאמנים ופעילות</p>
    </div>
    <div id="admin-body"></div>
  </div>

function t(key) { return (STRINGS[lang] && STRINGS[lang][key]) || STRINGS.en[key] || key; }

function setLang(newLang) {
  lang = newLang;
  localStorage.setItem('ch_lang', lang);
  const html = document.documentElement;
  html.lang = lang;
  html.dir = lang === 'he' ? 'rtl' : 'ltr';
  applyLangStrings();
  // Re-render active screen
  const active = document.querySelector('.screen.active');
  if (active) {
    const id = active.id.replace('screen-', '');
    if (id === 'calendar') renderCalendar();
    else if (id === 'groups') renderGroups();
    else if (id === 'summary') renderSummary();
    else if (id === 'settings') renderSettings();
    else if (id === 'admin') renderAdminPanel();
  }
}

// ─── HELPERS ──────────────────────────────────────────────
function escQ(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function escH(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escId(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }

function timeToMins(t) { const [h,m] = t.trim().split(':').map(Number); return h*60+m; }
function fmtHours(mins) {
  const h = Math.floor(mins/60), m = Math.round(mins%60);
  if (h === 0) return m + t('min');
  if (m === 0) return h + t('hr');
  return h + t('hr') + ' ' + m + t('min');
}
function fmtHoursDecimal(hours) { return fmtHours(Math.round(hours * 60)); }
function addMins(time, mins) {
  const [h,m] = time.split(':').map(Number);
  const t = h*60+m+mins;
  return String(Math.floor(t/60)%24).padStart(2,'0')+':'+String(t%60).padStart(2,'0');
}

function isAdmin() { return currentUser?.role === 'admin'; }
function activeUid() { return viewingUserId || currentUser?.id || ''; }
function requireAuth() { if (!currentUser) { logoutUser(); return false; } return true; }

// Pad date parts
function dateISO(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function parseDate(str) {
  // str = 'YYYY-MM-DD'
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y,m-1,d);
}

const MONTH_NAMES = ['january','february','march','april','may','june','july','august','september','october','november','december'];
const DAY_KEYS = ['sun','mon','tue','wed','thu','fri','sat'];
function monthName(idx) { return t(MONTH_NAMES[idx]); }
function dayHeader(idx) { return t(DAY_KEYS[idx]); } // 0=sun

function subscribeSessions() {
  if (sessionsUnsub) { sessionsUnsub(); sessionsUnsub = null; }
  let q;
  if (isAdmin()) {
    q = db.collection('sessions');
  } else {
    // Simple where-only query avoids needing a composite index
    q = db.collection('sessions').where('assignedCoachId','==',currentUser.id);
  }
  sessionsUnsub = q.onSnapshot(snap => {
    sessions = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .sort((a,b) => a.date.localeCompare(b.date) || a.startTime.localeCompare(b.startTime));
    if (document.getElementById('screen-calendar').classList.contains('active')) renderCalendar();
  }, e => console.error('[CoachHours] Sessions listener error:', e));
}

async function createRecurringSessions(base, freq, until) {
  const untilDate = parseDate(until);
  const dates = [];
  let cur = parseDate(base.date);
  const freqDays = freq === 'weekly' ? 7 : freq === 'biweekly' ? 14 : 30;
  while (cur <= untilDate) {
    dates.push(dateISO(cur));
    if (freq === 'monthly') { cur = new Date(cur.getFullYear(), cur.getMonth()+1, cur.getDate()); }
    else { cur = new Date(cur.getTime() + freqDays*24*60*60*1000); }
  }
  const parentId = 'r' + Date.now();
  const batch = db.batch();
  dates.forEach(d => {
    const ref = db.collection('sessions').doc();
    batch.set(ref, { ...base, date: d, recurring: { freq, until, parentId }, createdBy: currentUser.id, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
  });
  await batch.commit();
  logActivity('CREATE_RECURRING', base.name + ' x' + dates.length);
}

function getCalendarSessions() {
  if (viewingUserId) return sessions.filter(s => s.assignedCoachId === viewingUserId);
  return sessions;
}

function sessionsForDate(dateStr) {
  return getCalendarSessions().filter(s => s.date === dateStr);
}

function setCalView(view) {
  calView = view;
  ['month','week','day'].forEach(v => {
    document.getElementById('cvb-'+v)?.classList.toggle('active', v === view);
  });
  renderCalendar();
}

function calPrev() {
  if (calView === 'month') { calDate = new Date(calDate.getFullYear(), calDate.getMonth()-1, 1); }
  else if (calView === 'week') { calDate = new Date(calDate.getTime() - 7*24*60*60*1000); }
  else { calDate = new Date(calDate.getTime() - 24*60*60*1000); }
  renderCalendar();
}
function calNext() {
  if (calView === 'month') { calDate = new Date(calDate.getFullYear(), calDate.getMonth()+1, 1); }
  else if (calView === 'week') { calDate = new Date(calDate.getTime() + 7*24*60*60*1000); }
  else { calDate = new Date(calDate.getTime() + 24*60*60*1000); }
  renderCalendar();
}

function renderCalendar() {
  // Show/hide "Today" jump chip
  const todayChip = document.getElementById('cal-today-chip');
  if (todayChip) {
    const today = new Date();
    const todayStr = dateISO(today);
    let todayInView = false;
    if (calView === 'month') {
      todayInView = calDate.getFullYear() === today.getFullYear() && calDate.getMonth() === today.getMonth();
    } else if (calView === 'week') {
      const dow = calDate.getDay();
      const monday = new Date(calDate.getTime() - ((dow + 6) % 7) * 86400000);
      const sunday = new Date(monday.getTime() + 6 * 86400000);
      todayInView = today >= monday && today <= new Date(sunday.getTime() + 86400000 - 1);
    } else {
      todayInView = dateISO(calDate) === todayStr;
    }
    todayChip.style.display = todayInView ? 'none' : '';
    todayChip.textContent = t('today');
  }
  // Render today strip
  const stripEl = document.getElementById('cal-today-strip');
  if (stripEl) stripEl.innerHTML = renderTodayStrip();
  // Render view
  if (calView === 'month') renderMonthView();
  else if (calView === 'week') renderWeekView();
  else renderDayView();
}

function calJumpToday() {
  calDate = new Date();
  renderCalendar();
}

function renderTodayStrip() {
  const todayStr = dateISO(new Date());
  // Only show when today is visible in current view
  const now = new Date();
  let todayInView = false;
  if (calView === 'month') {
    todayInView = calDate.getFullYear() === now.getFullYear() && calDate.getMonth() === now.getMonth();
  } else if (calView === 'week') {
    const dow = calDate.getDay();
    const monday = new Date(calDate.getTime() - ((dow + 6) % 7) * 86400000);
    const sunday = new Date(monday.getTime() + 6 * 86400000);
    todayInView = now >= monday && now <= new Date(sunday.getTime() + 86400000 - 1);
  } else {
    todayInView = dateISO(calDate) === todayStr;
  }
  if (!todayInView) return '';
  const todaySessions = sessionsForDate(todayStr).filter(s => !s.cancelled?.whole && !s.cancelled?.general);
  if (!todaySessions.length) return '';

  const nowMins = now.getHours() * 60 + now.getMinutes();
  const upcoming = [...todaySessions]
    .sort((a, b) => timeToMins(a.startTime) - timeToMins(b.startTime))
    .find(s => timeToMins(s.startTime) > nowMins);

  let totalHours = 0, totalEarnings = 0;
  todaySessions.forEach(s => {
    const h = sessionHours(s);
    totalHours += h;
    totalEarnings += h * (s.type === 'private' ? (settings.ratePrivate||0) : (settings.rateGroup||0));
  });

  const nextInfo = upcoming
    ? `<span style="color:var(--text2)">▶ ${upcoming.startTime}</span>`
    : `<span style="color:var(--green)">✓ ${lang==='he'?'הכל נגמר':'All done'}</span>`;

  return `<div style="margin:0 16px 8px;padding:10px 14px;background:rgba(255,255,255,0.035);border:0.5px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;gap:12px">
    <div style="flex:1;min-width:0">
      <div style="font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:5px">${t('todaySessionsLabel')}</div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="font-size:14px;font-weight:600">${todaySessions.length} ${lang==='he'?'אימונים':'sessions'}</span>
        <span style="color:var(--text3);font-size:12px">·</span>
        <span style="font-size:13px;color:var(--text2)">${fmtHoursDecimal(totalHours)}</span>
        <span style="color:var(--text3);font-size:12px">·</span>
        <span style="font-size:13px;color:var(--green);font-weight:500">₪${Math.round(totalEarnings)}</span>
        <span style="color:var(--text3);font-size:12px">·</span>
        ${nextInfo}
      </div>
    </div>
  </div>`;
}

function renderMonthView() {
  const year = calDate.getFullYear(), month = calDate.getMonth();
  if (isAdmin()) document.getElementById('cal-add-btn').style.display = '';
  document.getElementById('cal-title').textContent = monthName(month) + ' ' + year;

  const today = dateISO(new Date());
  const firstDay = new Date(year, month, 1);
  const lastDay  = new Date(year, month+1, 0);
  // Start week on Sunday (0)
  let startDow = firstDay.getDay(); // 0=Sun

  const days = [];
  // Previous month padding
  for (let i = 0; i < startDow; i++) {
    const d = new Date(year, month, 1-startDow+i);
    days.push({ date: dateISO(d), otherMonth: true });
  }
  // Current month
  for (let d = 1; d <= lastDay.getDate(); d++) {
    days.push({ date: dateISO(new Date(year, month, d)), otherMonth: false });
  }
  // Next month padding (fill to 6 weeks = 42 cells)
  while (days.length % 7 !== 0) {
    const d = new Date(year, month+1, days.length - lastDay.getDate() - startDow + 1);
    days.push({ date: dateISO(d), otherMonth: true });
  }

  const dayHeaders = DAY_KEYS.map(k => `<div class="month-day-header">${t(k)}</div>`).join('');

  const cells = days.map(({ date, otherMonth }) => {
    const dayNum = parseInt(date.split('-')[2]);
    const daysSessions = sessionsForDate(date);
    const isToday = date === today;
    const chips = daysSessions.slice(0,2).map(s => {
      const isCancelled = s.cancelled && (s.cancelled.whole || s.cancelled.from || s.cancelled.general);
      const cls = isCancelled ? 'month-chip-cancelled' : (s.type === 'group' ? 'month-chip-group' : 'month-chip-private');
      return `<div class="month-chip ${cls}">${escH(s.name)}</div>`;
    }).join('');
    const more = daysSessions.length > 2 ? `<div class="month-more">+${daysSessions.length-2}</div>` : '';
    const addBtn = isAdmin() ? `<button class="month-add-btn" onclick="event.stopPropagation();openSessionModal('${date}',null,null)">+</button>` : '';
    return `<div class="month-day${otherMonth?' other-month':''}${isToday?' today':''}" onclick="goToDay('${date}')">
      <div class="month-day-num">${dayNum}</div>
      ${chips}${more}${addBtn}
    </div>`;
  }).join('');

  document.getElementById('cal-body').innerHTML = `
    <div class="month-grid">
      ${dayHeaders}
      ${cells}
    </div>
  `;
}

function goToDay(dateStr) {
  calDate = parseDate(dateStr);
  setCalView('day');
}

function renderWeekView() {
  if (isAdmin()) document.getElementById('cal-add-btn').style.display = '';
  // Get Monday of the week containing calDate
  const dow = calDate.getDay(); // 0=Sun
  const monday = new Date(calDate.getTime() - ((dow + 6) % 7) * 24*60*60*1000); // start from Monday
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday.getTime() + i*24*60*60*1000);
    days.push(d);
  }
  const startStr = days[0].getDate() + ' ' + t(MONTH_NAMES[days[0].getMonth()].replace('Short',''));
  const endStr   = days[6].getDate() + ' ' + monthName(days[6].getMonth()) + ' ' + days[6].getFullYear();
  document.getElementById('cal-title').textContent = startStr + ' – ' + endStr;

  const today = dateISO(new Date());
  let html = '';
  days.forEach(d => {
    const dateStr = dateISO(d);
    const dayLabel = t(DAY_KEYS[d.getDay()]) + ' ' + d.getDate() + '/' + (d.getMonth()+1);
    const isToday = dateStr === today;
    const daySessions = sessionsForDate(dateStr);
    const addBtn = isAdmin() ? `<button onclick="openSessionModal('${dateStr}',null,null)" style="background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;line-height:1;padding:0 4px">+</button>` : '';
    html += `<div class="week-day-block">
      <div class="week-day-header${isToday?' today':''}">
        <span>${dayLabel}</span>${addBtn}
      </div>`;
    if (!daySessions.length) {
      html += `<div style="font-size:11px;color:var(--text3);padding:4px 0 6px">${t('noSessions')}</div>`;
    } else {
      daySessions.forEach(s => { html += sessionCardHtml(s); });
    }
    html += '</div>';
  });
  document.getElementById('cal-body').innerHTML = html;
}

function renderDayView() {
  document.getElementById('cal-add-btn').style.display = 'none'; // day view has its own add button
  const dateStr = dateISO(calDate);

  if (!daySessions.length) {
    html += `<div class="card"><div class="empty">${t('noSessions')}</div></div>`;

    sorted.forEach(s => { html += sessionCardHtml(s, true); });
    html += '</div>';
  }
  document.getElementById('cal-body').innerHTML = html;
}

function sessionCardHtml(s) {
  const isCancelled = s.cancelled && (s.cancelled.whole || s.cancelled.from || s.cancelled.general);
  const typeClass = s.type === 'group' ? 'group' : 'private';
  const cancelClass = isCancelled ? ' cancelled' : '';
  const coachName = allCoaches.find(c => c.id === s.assignedCoachId)?.username || '';
  const groupName = s.groupId && groups[s.groupId] ? groups[s.groupId].name : '';
  const playerName = s.assignedPlayerName || '';

  // Type badge
  const typeBadge = `<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;margin-inline-start:6px;${
    s.type==='group'
      ? 'background:rgba(96,165,250,0.2);color:var(--blue)'
      : 'background:rgba(34,197,94,0.2);color:var(--green)'
  }">${t(s.type)}</span>`;

  // Info rows
  let infoRows = `<div class="session-card-meta" style="margin-top:5px">⏱ ${s.startTime} – ${s.endTime}</div>`;
  if (coachName) infoRows += `<div class="session-card-meta">👤 ${escH(coachName)}</div>`;
  if (groupName) infoRows += `<div class="session-card-meta">👥 ${escH(groupName)}</div>`;
  if (playerName) infoRows += `<div class="session-card-meta">🎯 ${escH(playerName)}</div>`;
  if (s.notes) infoRows += `<div class="session-card-meta" style="font-style:italic;color:var(--text3)">📝 ${escH(s.notes)}</div>`;

  let cancelBadge = '';
  if (isCancelled) {
    let reason, icon;
    if (s.cancelled.general) { reason = t('cancelGeneral'); icon = '🚫'; }
    else if (s.cancelled.whole) { reason = t('rainWhole'); icon = '🌧'; }
    else { reason = `${t('rainFrom')} ${s.cancelled.from}`; icon = '🌧'; }
    cancelBadge = `<div class="session-card-cancelled-badge">${icon} ${t('cancelled')} — ${reason}</div>`;
  }

  let attBtn = '';
  if (s.type === 'group' && !isCancelled && isAttendanceOpen(s)) {
    const present = s.attendance?.present?.length ?? '?';
    const total = s.groupId && groups[s.groupId] ? groups[s.groupId].players.length : '?';
    attBtn = `<div class="session-card-att-btn" onclick="event.stopPropagation();openAttendanceModal('${s.id}')">✅ ${t('attendance')} ${present}/${total}</div>`;
  } else if (s.type === 'group' && !isCancelled && s.attendance) {
    const present = s.attendance.present?.length ?? 0;
    const total = s.groupId && groups[s.groupId] ? groups[s.groupId].players.length : '?';
    attBtn = `<div style="font-size:11px;color:var(--text3);margin-top:4px">✅ ${present}/${total}</div>`;
  }

  const clickHandler = isAdmin() ? `onclick="openSessionModal('${s.date}','${s.startTime}','${escQ(s.id)}')"` : '';
  const slotTaken = sessions.some(x => x.date === s.date && x.id !== s.id && x.startTime === s.endTime);
  const nextBtn = (isAdmin() && !slotTaken) ? `<button style="margin-top:6px;padding:4px 10px;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius-sm);font-size:11px;color:var(--text2);cursor:pointer;font-family:inherit" onclick="event.stopPropagation();openSessionModal('${escQ(s.date)}','${escQ(s.endTime)}',null)">${t('nextSessionFrom')} ${s.endTime}</button>` : '';

  return `<div class="session-card ${typeClass}${cancelClass}" ${clickHandler} style="margin-bottom:8px">
    <div style="display:flex;align-items:center">
      <div class="session-card-name" style="flex:1">${escH(s.name)}</div>${typeBadge}
    </div>
    ${infoRows}
    ${cancelBadge}
    ${attBtn}
    ${nextBtn}
  </div>`;
}

// ─── ATTENDANCE ────────────────────────────────────────────
function isAttendanceOpen(session) {
  const now = new Date();
  const [endH, endM] = session.endTime.split(':').map(Number);
  const sessionEnd = parseDate(session.date);
  sessionEnd.setHours(endH, endM, 0, 0);
  const nextDay10 = parseDate(session.date);
  nextDay10.setDate(nextDay10.getDate() + 1);
  nextDay10.setHours(10, 0, 0, 0);
  return now >= sessionEnd && now <= nextDay10;
}

function openAttendanceModal(sessionId) {
  const s = sessions.find(x => x.id === sessionId);
  if (!s) return;
  const g = s.groupId ? groups[s.groupId] : null;

  if (!g) {
    createModal(`<div class="sheet-title">${t('attendance')}</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:16px">${t('matchingGroupNotFound')}</p>
      <button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button>`);
    return;
  }

  if (!isAttendanceOpen(s)) {
    createModal(`<div class="sheet-title">${t('attendance')}</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:16px">${t('attendanceWindow')}</p>
      <button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button>`);
    return;
  }

  const current = s.attendance?.present || [];
  const savedAt = s.attendance?.savedAt || null;
  const rows = g.players.map(name => `
    <label style="display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:0.5px solid var(--border);cursor:pointer">
      <input type="checkbox" id="att-${escId(name)}" ${current.includes(name)?'checked':''}
        style="width:18px;height:18px;accent-color:var(--blue)">
      <span style="font-size:15px">${escH(name)}</span>
    </label>`).join('');
  const noPlayers = !g.players.length ? `<p style="color:var(--text2);font-size:13px;padding:12px 0">${t('noPlayers')}</p>` : '';

  createModal(`
    <div class="sheet-title">${escH(g.name)}</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:14px">${s.date} · ${s.startTime}${savedAt?' · '+savedAt:''}</div>
    ${rows}${noPlayers}
    <button class="btn btn-primary" style="margin-top:14px" onclick="saveAttendance('${sessionId}','${g.players.map(escQ).join(',')}')">
      ${t('saveAttendance')}
    </button>
    <button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button>
  `);
}

async function saveAttendance(sessionId, playersCsv) {
  const players = playersCsv ? playersCsv.split(',') : [];
  const present = players.filter(name => document.getElementById('att-'+escId(name))?.checked);
  const now = new Date();
  const savedAt = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  await updateSession(sessionId, { attendance: { present, savedAt } });
  closeModal();
  logActivity('SAVE_ATTENDANCE', sessionId);
}

function getAllPlayers() {
  const seen = new Set();
  Object.values(groups).forEach(g => g.players.forEach(p => seen.add(p)));
  Object.values(players).forEach(p => seen.add(p.name));
  return [...seen].sort();
}

function onGroupChange(groupId) {
  const g = groups[groupId];
  if (!g) return;
  const nameEl = document.getElementById('sm-name');
  if (nameEl) nameEl.value = g.name;
}

let _sessionType = 'private';
let _recurringFreq = 'none';
let _rainMode = 'none';

function setSessionType(type) {
  _sessionType = type;
  document.getElementById('sm-type-private')?.classList.toggle('act-private', type==='private');
  document.getElementById('sm-type-group')?.classList.toggle('act-group', type==='group');
  document.getElementById('sm-group-row').style.display  = type==='group'   ? '' : 'none';
  document.getElementById('sm-player-row').style.display = type==='private' ? '' : 'none';
}

function setRecurring(freq) {
  _recurringFreq = freq;
  ['none','weekly','biweekly','monthly'].forEach(f => {
    document.getElementById('rec-'+f)?.classList.toggle('active', f===freq);
  });
  const row = document.getElementById('rec-until-row');
  if (row) row.style.display = freq !== 'none' ? '' : 'none';
}

function setRainCancel(mode) {
  _rainMode = mode;
  const fromRow = document.getElementById('rain-from-row');
  if (fromRow) fromRow.style.display = mode==='from' ? '' : 'none';
  ['none','general','whole','from'].forEach(m => {
    document.getElementById('rain-'+m)?.classList.toggle('active', m===mode);
  });
}

let _activeDuration = 60;
function setDuration(mins) {
  _activeDuration = mins;
  [45,60,90].forEach(d => document.getElementById('dur-'+d)?.classList.toggle('active', d===mins));
  const start = document.getElementById('sm-start')?.value;
  if (start) document.getElementById('sm-end').value = addMins(start, mins);
}

function updateEndByDuration() {
  const start = document.getElementById('sm-start')?.value;
  if (start && document.getElementById('dur-60')) {
    document.getElementById('sm-end').value = addMins(start, _activeDuration);
  }
}

async function saveSessionModal() {
  const name  = document.getElementById('sm-name')?.value.trim();
  const start = document.getElementById('sm-start')?.value;
  const end   = document.getElementById('sm-end')?.value;
  const date  = document.getElementById('sm-date')?.value;
  const coach  = document.getElementById('sm-coach')?.value || null;
  const grp    = document.getElementById('sm-group')?.value || null;
  const player = document.getElementById('sm-player')?.value.trim() || null;
  const type   = document.getElementById('sm-type-group')?.classList.contains('act-group') ? 'group' : 'private';
  const notes  = document.getElementById('sm-notes')?.value.trim() || '';

  if (!name || !start || !end || !date) return;

  const timeErrEl = document.getElementById('sm-time-error');
  if (timeToMins(end) <= timeToMins(start)) {
    if (timeErrEl) { timeErrEl.textContent = t('errEndBeforeStart'); timeErrEl.style.display = 'block'; }
    return;
  }
  if (timeErrEl) timeErrEl.style.display = 'none';

  const base = {
    name, startTime: start, endTime: end, date, notes,
    type, assignedCoachId: coach || null,
    groupId: type==='group' ? grp : null,
    assignedPlayerName: type==='private' ? player : null,
    cancelled: false, attendance: null, recurring: null
  };

  if (_modalSession) {
    // Editing existing
    const patch = { name, startTime: start, endTime: end, date, notes, type, assignedCoachId: coach||null,
      groupId: type==='group'?grp:null, assignedPlayerName: type==='private'?player:null };
    // Handle cancellation
    if (_rainMode === 'none') patch.cancelled = false;
    else if (_rainMode === 'general') patch.cancelled = { general: true, whole: false, from: null };
    else if (_rainMode === 'whole') patch.cancelled = { whole: true, from: null, reason: 'rain' };
    else if (_rainMode === 'from') {
      const fromTime = document.getElementById('rain-from-time')?.value || start;
      patch.cancelled = { whole: false, from: fromTime, reason: 'rain' };
    }
    await updateSession(_modalSession.id, patch);
    logActivity('EDIT_SESSION', name);
  } else {
    // New session
    const until = document.getElementById('sm-until')?.value;
    if (_recurringFreq !== 'none' && until) {
      await createRecurringSessions(base, _recurringFreq, until);
    } else {
      await createSession(base);
    }
  }
  closeModal();
}

function confirmDeleteSession(sessionId) {
  const s = sessions.find(x => x.id === sessionId);
  showConfirmModal(t('confirmDeleteMsg'), async () => {
    closeModal();
    await deleteSessionDoc(sessionId);
  });
}

// ─── GROUPS ───────────────────────────────────────────────
let expandedGroupIds = new Set();
let expandedGroupEditMode = new Set();

function renderGroups() {
  const addRow = document.getElementById('groups-add-btn-row');
  if (addRow) addRow.style.display = isAdmin() ? '' : 'none';

  const gArr = Object.values(groups);
  const el = document.getElementById('groups-list');
  if (!gArr.length) { el.innerHTML = `<div class="empty">${t('noGroups')}</div>`; renderIndividualPlayers(); return; }

  el.innerHTML = gArr.map(g => {
    const expanded = expandedGroupIds.has(g.id);
    const sessionCount = getCalendarSessions().filter(s => s.groupId === g.id).length;
    let inner = '';
    if (expanded) {
      const editMode = expandedGroupEditMode.has(g.id);
      const chips = g.players.map(name =>
        `<span class="player-chip">${escH(name)}${(isAdmin()&&editMode)?`<span class="rm" onclick="confirmRemovePlayer('${g.id}','${escQ(name)}')">×</span>`:''}
        </span>`
      ).join('') || `<span style="font-size:13px;color:var(--text3)">${t('noPlayers')}</span>`;

      const editToggleBtn = isAdmin() ? `<button onclick="toggleGroupEditMode('${g.id}')" style="padding:4px 12px;font-size:12px;background:${editMode?'var(--orange-bg)':'var(--bg3)'};color:${editMode?'var(--orange)':'var(--text2)'};border:0.5px solid ${editMode?'var(--orange)':'var(--border)'};border-radius:20px;cursor:pointer;font-family:inherit;margin-bottom:8px">${editMode?t('donePlayers'):t('editPlayers')}</button>` : '';

      const addPlayerRow = (isAdmin()&&editMode) ? `<div class="add-row">
        <input type="text" id="add-pl-${g.id}" placeholder="${t('players')}">
        <button onclick="addPlayer('${g.id}',document.getElementById('add-pl-${g.id}').value);document.getElementById('add-pl-${g.id}').value=''">${t('addPlayer')}</button>
      </div>` : '';

      const scheduleBtn = isAdmin() ? `<button onclick="openSessionModal(null,null,null,'${g.id}')" style="width:100%;margin-top:10px;padding:9px;background:var(--blue-bg);color:var(--blue);border:0.5px solid var(--blue);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:inherit">${t('scheduleGroupSession')}</button>` : '';

      const deleteRow = (isAdmin()&&editMode) ? `<button onclick="confirmDeleteGroupUI('${g.id}')" style="width:100%;margin-top:8px;padding:9px;background:var(--red-bg);color:var(--red);border:0.5px solid var(--red);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:inherit">${t('deleteGroup')}</button>` : '';

      // Attendance stats
      let attHtml = '';
      if (g.players.length) {
        const gsessions = getCalendarSessions().filter(s => s.groupId === g.id && s.attendance);
        if (gsessions.length) {
          const counts = {};
          gsessions.forEach(s => (s.attendance.present||[]).forEach(n => { counts[n]=(counts[n]||0)+1; }));
          attHtml = `<div style="margin-top:14px">
            <div style="font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:8px">${t('attendance')} (${gsessions.length})</div>
            ${g.players.map(name => {
              const c = counts[name]||0;
              const pct = gsessions.length ? (c/gsessions.length)*100 : 0;
              return `<div class="att-row">
                <span style="font-size:13px;min-width:90px;flex-shrink:0">${escH(name)}</span>
                <div class="att-bar"><div class="att-fill" style="width:${pct}%"></div></div>
                <span style="font-size:12px;color:var(--text2);min-width:38px;text-align:${lang==='he'?'left':'right'}">${c}/${gsessions.length}</span>
              </div>`;
            }).join('')}
          </div>`;
        }
      }

      inner = `<div style="border-top:0.5px solid var(--border);margin-top:12px;padding-top:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.07em;text-transform:uppercase">${t('players')}</div>
          ${editToggleBtn}
        </div>
        <div class="player-chips" style="margin-bottom:10px">${chips}</div>
        ${addPlayerRow}${attHtml}${scheduleBtn}${deleteRow}
      </div>`;
    }

    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="toggleGroupExpand('${g.id}')">
        <div>
          <div style="font-size:15px;font-weight:600">${escH(g.name)}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px">${g.players.length} · ${sessionCount} ${t('sessionsCount')}</div>
        </div>
        <span style="font-size:22px;color:var(--text3);display:inline-block;transform:rotate(${expanded?'90':'0'}deg)">›</span>
      </div>${inner}
    </div>`;
  }).join('');

  renderIndividualPlayers();
}

function toggleGroupExpand(id) {
  if (expandedGroupIds.has(id)) { expandedGroupIds.delete(id); expandedGroupEditMode.delete(id); }
  else expandedGroupIds.add(id);
  renderGroups();
}

function toggleGroupEditMode(id) {
  if (expandedGroupEditMode.has(id)) expandedGroupEditMode.delete(id); else expandedGroupEditMode.add(id);
  renderGroups();
}

function openAddGroupModal() {
  if (!isAdmin()) return;
  createModal(`
    <div class="sheet-title">${t('newGroup')}</div>
    <input type="text" id="new-group-input" placeholder="${t('groupName')}"
      style="width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:8px;padding:11px 12px;font-size:16px;color:var(--text);font-family:inherit;margin-bottom:10px"
      onkeydown="if(event.key==='Enter')document.getElementById('new-group-ok').click()">
    <button id="new-group-ok" class="btn btn-primary" style="margin-top:0" onclick="window._addGroupCb()">${t('confirm')}</button>
    <button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button>
  `);
  window._addGroupCb = async () => {
    const v = document.getElementById('new-group-input')?.value.trim();

async function addPlayer(groupId, name) {
  if (!isAdmin()) return;
  const n = name.trim();
  if (!n) return;
  const g = groups[groupId];

// ─── SUMMARY ──────────────────────────────────────────────
let summaryDate = new Date();

function sessionHours(s) {
  if (s.cancelled?.whole || s.cancelled?.general) return 0;
  if (s.cancelled?.from) {
    const played = timeToMins(s.cancelled.from) - timeToMins(s.startTime);
    return Math.max(0, played) / 60;
  }
  return (timeToMins(s.endTime) - timeToMins(s.startTime)) / 60;
}

function renderSummary() {
  const year = summaryDate.getFullYear();
  const month = summaryDate.getMonth();
  const monthStr = String(month+1).padStart(2,'0');
  const prefix = `${year}-${monthStr}`;

  document.getElementById('summary-h1').textContent = t('summary');
  document.getElementById('summary-subtitle').textContent = t('summarySubtitle');

  // Filter sessions for this month visible to the current user
  const monthSessions = getCalendarSessions().filter(s => s.date.startsWith(prefix));

  // Salary calc
  let privateHours = 0, groupHours = 0, privateCount = 0, groupCount = 0;
  let cancelledWhole = 0, partialCount = 0;
  monthSessions.forEach(s => {
    const h = sessionHours(s);
    if (s.cancelled?.whole || s.cancelled?.general) { cancelledWhole++; return; }
    if (s.cancelled?.from) partialCount++;
    if (s.type === 'private') { privateHours += h; privateCount++; }
    else { groupHours += h; groupCount++; }
  });

  const rate = (type) => type === 'private' ? (settings.ratePrivate||0) : (settings.rateGroup||0);
  const privateEarnings = privateHours * rate('private');
  const groupEarnings   = groupHours   * rate('group');
  const totalEarnings   = privateEarnings + groupEarnings;
  const totalHours      = privateHours + groupHours;

  const navPrev = '‹';
  const navNext = '›';
  const nav = `<div style="display:flex;align-items:center;padding:0 16px 12px">
    <div style="flex:1;display:flex;justify-content:center;align-items:center;gap:2px">
      <button onclick="summaryPrev()" style="background:none;border:none;color:var(--text2);font-size:26px;cursor:pointer;padding:8px 12px;line-height:1;font-family:inherit">${navPrev}</button>
      <div style="font-size:16px;font-weight:600;width:180px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${monthName(month)} ${year}</div>
      <button onclick="summaryNext()" style="background:none;border:none;color:var(--text2);font-size:26px;cursor:pointer;padding:8px 12px;line-height:1;font-family:inherit">${navNext}</button>
    </div>
    <button id="summary-share-btn" onclick="shareMonthlySummary()" style="background:none;border:0.5px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;font-family:inherit;transition:opacity 0.15s;line-height:1;flex-shrink:0">${t('shareMonth')}</button>
  </div>`;

  const statsCard = `<div class="card">
    <div class="breakdown-row">
      <span class="breakdown-label">${t('privateSessions')}</span>
      <span class="breakdown-val">${privateCount} · ${fmtHoursDecimal(privateHours)}</span>
    </div>
    <div class="breakdown-row">
      <span class="breakdown-label">${t('groupSessions')}</span>
      <span class="breakdown-val">${groupCount} · ${fmtHoursDecimal(groupHours)}</span>
    </div>
    ${partialCount ? `<div class="breakdown-row">
      <span class="breakdown-label" style="color:var(--orange)">🌧 ${t('partialSessions')}</span>
      <span class="breakdown-val" style="color:var(--orange)">${partialCount}</span>
    </div>` : ''}
    ${cancelledWhole ? `<div class="breakdown-row">
      <span class="breakdown-label" style="color:var(--text3)">🌧 ${t('cancelledSessions')}</span>
      <span class="breakdown-val" style="color:var(--text3)">${cancelledWhole}</span>
    </div>` : ''}
    <div class="breakdown-row" style="border-top:1px solid var(--border2);margin-top:4px;padding-top:12px">
      <span class="breakdown-label" style="font-weight:600">${t('totalHours')}</span>
      <span class="breakdown-val" style="font-weight:700">${fmtHoursDecimal(totalHours)}</span>
    </div>
    <div class="breakdown-row">
      <span class="breakdown-label" style="font-weight:600">${t('totalEarnings')}</span>
      <span class="breakdown-val" style="font-weight:700;color:var(--green)">₪${totalEarnings.toFixed(0)}</span>
    </div>
  </div>`;

  // Session list grouped by day
  const sortedSessions = [...monthSessions].sort((a,b) => a.date.localeCompare(b.date)||a.startTime.localeCompare(b.startTime));

  // Group by date
  const byDay = [];
  sortedSessions.forEach(s => {
    const last = byDay[byDay.length - 1];
    if (last && last.date === s.date) last.sessions.push(s);
    else byDay.push({ date: s.date, sessions: [s] });
  });

  const dayBlocks = byDay.map(({ date, sessions: daySessions }) => {
    const [y, mo, d] = date.split('-').map(Number);
    const dow = new Date(y, mo-1, d).getDay();
    const dayLabel = `${t(DAY_KEYS[dow])}, ${d} ${t(MONTH_NAMES[mo-1])}`;

    const rows = daySessions.map((s, i) => {
      const h = sessionHours(s);
      const isCancelled = s.cancelled?.whole;
      const isPartial = !!s.cancelled?.from;
      const coachName = allCoaches.find(c => c.id === s.assignedCoachId)?.username || '';
      const earnings = (h * rate(s.type)).toFixed(0);
      const isLast = i === daySessions.length - 1;
      return `<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;${isLast?'':'border-bottom:0.5px solid var(--border);'}${isCancelled?'opacity:0.4;':''}">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escH(s.name)}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px">${s.startTime}${isPartial?' – '+s.cancelled.from+' 🌧':' – '+s.endTime}${coachName?' · '+escH(coachName):''}</div>
        </div>
        <div style="text-align:${lang==='he'?'left':'right'};flex-shrink:0">
          <div style="font-size:13px;font-weight:500;color:${isCancelled?'var(--text3)':isPartial?'var(--orange)':'var(--text)'}">${fmtHoursDecimal(h)}</div>
          ${!isCancelled?`<div style="font-size:11px;color:var(--text2)">₪${earnings}</div>`:''}
        </div>
      </div>`;
    }).join('');

    return `<div class="card" style="margin-bottom:8px">
      <div style="font-size:12px;font-weight:600;color:var(--text2);letter-spacing:0.04em;text-transform:uppercase;margin-bottom:4px">${escH(dayLabel)}</div>
      ${rows}
    </div>`;
  }).join('');

  const listCard = byDay.length ? dayBlocks : `<div class="empty">${t('noSessions')}</div>`;

  document.getElementById('summary-body').innerHTML = nav + `<div class="section-divider">${t('monthlySummary')}</div>` + statsCard + listCard;
}

function summaryPrev() {
  summaryDate = new Date(summaryDate.getFullYear(), summaryDate.getMonth()-1, 1);

function summaryNext() {

async function shareMonthlySummary() {
  const year = summaryDate.getFullYear();
  const month = summaryDate.getMonth();
  const prefix = `${year}-${String(month+1).padStart(2,'0')}`;
  const monthSessions = getCalendarSessions().filter(s => s.date.startsWith(prefix));

  let privateHours = 0, groupHours = 0, privateCount = 0, groupCount = 0;
  monthSessions.forEach(s => {
    const h = sessionHours(s);
    if (s.cancelled?.whole || s.cancelled?.general) return;
    if (s.type === 'private') { privateHours += h; privateCount++; }
    else { groupHours += h; groupCount++; }
  });
  const totalHours = privateHours + groupHours;
  const totalEarnings = privateHours * (settings.ratePrivate||0) + groupHours * (settings.rateGroup||0);

  const isHe = lang === 'he';
  const lines = [
    `📅 ${monthName(month)} ${year}`,
    ``,
    `${isHe ? 'פרטיים' : 'Private'}: ${privateCount} (${fmtHoursDecimal(privateHours)})`,
    `${isHe ? 'קבוצתיים' : 'Group'}: ${groupCount} (${fmtHoursDecimal(groupHours)})`,
    ``,
    `${t('totalHours')}: ${fmtHoursDecimal(totalHours)}`,
    `${t('totalEarnings')}: ₪${Math.round(totalEarnings)}`,
  ].join('\n');

  const btn = document.getElementById('summary-share-btn');
  const flash = (msg) => {
    if (!btn) return;
    const orig = btn.textContent;
    btn.textContent = msg;
    btn.style.color = 'var(--green)';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1800);
  };

  if (navigator.share) {
    try { await navigator.share({ text: lines }); } catch(e) { /* dismissed */ }
  } else if (navigator.clipboard?.writeText) {
    await navigator.clipboard.writeText(lines);
    flash(t('copiedToClipboard'));
  }
}

  const arrow   = document.getElementById('change-pwd-arrow');
  const open = section.style.display !== 'none';
  section.style.display = open ? 'none' : '';
  if (arrow) arrow.style.transform = open ? '' : 'rotate(90deg)';
}

async function changePassword() {
  if (!requireAuth()) return;
  const newPwd  = document.getElementById('pwd-new')?.value;
  const confPwd = document.getElementById('pwd-confirm')?.value;
  const errEl   = document.getElementById('change-pwd-error');
  const okEl    = document.getElementById('change-pwd-ok');
  if (errEl) errEl.style.display = 'none';
  if (okEl) okEl.style.display = 'none';
  if (!newPwd || newPwd.length < 6) { if (errEl) { errEl.textContent = t('passwordTooShort'); errEl.style.display = 'block'; } return; }
  if (newPwd !== confPwd) { if (errEl) { errEl.textContent = t('passwordMismatch'); errEl.style.display = 'block'; } return; }
  try {
    await auth.currentUser.updatePassword(newPwd);
    if (document.getElementById('pwd-new')) document.getElementById('pwd-new').value = '';
    if (document.getElementById('pwd-confirm')) document.getElementById('pwd-confirm').value = '';
    if (okEl) okEl.style.display = 'block';
    logActivity('CHANGE_PASSWORD', currentUser?.username);
  } catch(e) {
    if (errEl) {
      errEl.textContent = e.code === 'auth/requires-recent-login' ? t('recentLoginRequired') : t('passwordUpdateError');
      errEl.style.display = 'block';
    }
  }
}

async function adminExitView() {
  viewingUserId = null;
  document.getElementById('view-banner')?.remove();
  document.querySelector('.app')?.classList.remove('viewing');
  showScreen('admin');
}

async function adminToggleRole(userId) {
  try {
    const doc = await db.collection('users').doc(userId).get();
    if (!doc.exists) return;
    const newRole = doc.data().role === 'admin' ? 'coach' : 'admin';
    await db.collection('users').doc(userId).update({ role: newRole });
    logActivity('ADMIN_ROLE', `${doc.data().username} → ${newRole}`);
    renderAdminPanel();
  } catch(e) { console.error('[CoachHours] Toggle role failed:', e); }
}

function adminRemove(userId) {
  db.collection('users').doc(userId).get().then(doc => {
    if (!doc.exists) return;
    const u = doc.data();
    showConfirmModal(`${t('removeCoach')}: "${escH(u.username)}"?`, async () => {
      logActivity('ADMIN_REMOVE', u.username);
      await db.collection('users').doc(userId).update({ removed: true });
      closeModal();
      renderAdminPanel();
    });
  });
}

function toggleAuthMode() {
  authMode = authMode === 'login' ? 'register' : 'login';
  const isReg = authMode === 'register';
  document.getElementById('auth-subtitle').textContent = isReg ? t('registerNewCoach') : t('signInContinue');
  document.getElementById('auth-name-row').style.display = isReg ? '' : 'none';
  document.getElementById('auth-submit-btn').textContent = isReg ? t('register') : t('signIn');
  document.getElementById('auth-toggle-btn').textContent = isReg ? t('alreadyHaveAccount') : t('registerNewCoach');
  document.getElementById('auth-forgot-row').style.display = isReg ? 'none' : '';
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-success').style.display = 'none';
  document.getElementById('auth-resend-btn').style.display = 'none';
}

async function forgotPassword() {
  const email = document.getElementById('auth-email').value.trim();
  const errEl = document.getElementById('auth-error');
  const sucEl = document.getElementById('auth-success');
  errEl.style.display = 'none';
  sucEl.style.display = 'none';
  if (!email) { errEl.textContent = t('fillAllFields'); errEl.style.display = 'block'; return; }
  try {
    await auth.sendPasswordResetEmail(email);
    sucEl.textContent = t('resetEmailSent');
    sucEl.style.display = 'block';
  } catch(e) {
    errEl.textContent = e.code === 'auth/user-not-found' ? t('errUserNotFound') :
                        e.code === 'auth/invalid-email'  ? t('errInvalidEmail') : t('errGeneric');
    errEl.style.display = 'block';
  }
}

async function submitAuth() {
  const email    = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl    = document.getElementById('auth-error');
  const sucEl    = document.getElementById('auth-success');
  errEl.style.display = 'none';
  sucEl.style.display = 'none';
  if (!email || !password) { errEl.textContent = t('fillAllFields'); errEl.style.display = 'block'; return; }
  if (password.length < 6) { errEl.textContent = t('passwordTooShort'); errEl.style.display = 'block'; return; }
  const btn = document.getElementById('auth-submit-btn');
  btn.disabled = true;
  try {
    if (authMode === 'login') {
      const cred = await auth.signInWithEmailAndPassword(email, password);
      if (!cred.user.emailVerified) {
        await auth.signOut();
        errEl.textContent = t('verifyEmailFirst');
        errEl.style.display = 'block';
        document.getElementById('auth-resend-btn').style.display = '';
        btn.disabled = false;
        return;
      }
      // onAuthStateChanged handles the rest
    } else {
      const name = document.getElementById('auth-fullname').value.trim();
      if (!name) { errEl.textContent = t('fillAllFields'); errEl.style.display = 'block'; btn.disabled = false; return; }
      registering = true;
      const newCred = await auth.createUserWithEmailAndPassword(email, password);
      const metaDoc = await db.collection('meta').doc('firstUser').get();
      const role = !metaDoc.exists ? 'admin' : 'coach';
      await db.collection('users').doc(newCred.user.uid).set({ username: name, email, role, createdAt: Date.now() });
      if (!metaDoc.exists) await db.collection('meta').doc('firstUser').set({ uid: newCred.user.uid });
      await newCred.user.sendEmailVerification();
      registering = false;
      await auth.signOut();
      // Reset form
      document.getElementById('auth-email').value = '';
      document.getElementById('auth-password').value = '';
      document.getElementById('auth-fullname').value = '';
      document.getElementById('auth-name-row').style.display = 'none';
      authMode = 'login';
      document.getElementById('auth-submit-btn').textContent = t('signIn');
      document.getElementById('auth-toggle-btn').textContent = t('registerNewCoach');
      sucEl.textContent = t('accountCreated');
      sucEl.style.display = 'block';
    }
  } catch(e) {
    registering = false;
    errEl.textContent = firebaseAuthError(e.code);
    errEl.style.display = 'block';
  }
  btn.disabled = false;
}

async function resendVerification() {
  try {
    // Need to be signed in to resend — sign in briefly just to send verification
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    if (!email || !password) return;
    const cred = await auth.signInWithEmailAndPassword(email, password);
    await cred.user.sendEmailVerification();
    await auth.signOut();
    const sucEl = document.getElementById('auth-success');
    sucEl.textContent = t('verificationSent');
    sucEl.style.display = 'block';
  } catch(e) { console.error('[CoachHours] resendVerification error:', e); }
}

function firebaseAuthError(code) {
  return ({
    'auth/invalid-email': t('errInvalidEmail'),
    'auth/invalid-credential': t('errInvalidCredential'),
    'auth/user-not-found': t('errUserNotFound'),
    'auth/wrong-password': t('errWrongPassword'),
    'auth/email-already-in-use': t('errEmailInUse'),
    'auth/weak-password': t('errWeakPassword'),
    'auth/too-many-requests': t('errTooManyRequests'),
  })[code] || t('errGeneric');
}

function logoutUser() {
  logActivity('LOGOUT', currentUser?.username);
  if (sessionsUnsub) { sessionsUnsub(); sessionsUnsub = null; }
  if (groupsUnsub)   { groupsUnsub();   groupsUnsub = null; }
  if (playersUnsub)  { playersUnsub();  playersUnsub = null; }
  auth.signOut();
}

// ─── MODAL HELPERS ────────────────────────────────────────
function createModal(html) {
  document.getElementById('app-modal')?.remove();
  const overlay = document.createElement('div');
  overlay.id = 'app-modal';
  overlay.className = 'bottom-overlay';
  overlay.innerHTML = `<div class="bottom-sheet">${html}</div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.body.appendChild(overlay);
}
function closeModal() { document.getElementById('app-modal')?.remove(); }

function showConfirmModal(message, callback) {
  createModal(`
    <div class="sheet-title">${t('confirmDelete')}</div>
    <p style="font-size:14px;color:var(--text2);margin-bottom:16px">${escH(message)}</p>
    <button class="btn" style="background:var(--red);color:#fff;margin-top:0;margin-bottom:6px"
      onclick="window._modalCb&&window._modalCb()">${t('confirm')}</button>
    <button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button>
  `);
  window._modalCb = callback;
}

function showTypeConfirmModal(message, callback) {
  createModal(`
    <div class="sheet-title">${t('confirmDelete')}</div>
    <p style="font-size:14px;color:var(--text2);margin-bottom:12px">${escH(message)}</p>
    <p style="font-size:12px;color:var(--text3);margin-bottom:8px">${t('typeConfirmToDelete')}</p>
    <input type="text" id="type-confirm-input" placeholder="confirm" style="margin-bottom:12px"
      oninput="document.getElementById('type-confirm-btn').disabled=this.value.toLowerCase()!=='confirm'">
    <button id="type-confirm-btn" class="btn" style="background:var(--red);color:#fff;margin-top:0;margin-bottom:6px" disabled
      onclick="window._modalCb&&window._modalCb()">${t('confirm')}</button>
    <button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button>
  `);
  window._modalCb = callback;
  setTimeout(() => document.getElementById('type-confirm-input')?.focus(), 80);
}


// ─── SCREEN NAV ───────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+name)?.classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-'+name)?.classList.add('active');
  document.querySelectorAll('.sidebar-nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('snav-'+name)?.classList.add('active');
  if (name === 'calendar') renderCalendar();
  else if (name === 'groups') renderGroups();
  else if (name === 'summary') renderSummary();
  else if (name === 'settings') renderSettings();
  else if (name === 'admin') renderAdminPanel();
}

// ─── STARTUP ──────────────────────────────────────────────
window.onerror = (msg, src, line) => { console.error('[CoachHours Error]', msg, 'at', src+':'+line); return false; };
window.onunhandledrejection = e => console.error('[CoachHours Promise]', e.reason);

auth.onAuthStateChanged(async (fbUser) => {
  if (registering) return;
  if (fbUser) {
    try {
      // Email must be verified
      if (!fbUser.emailVerified) {
        document.getElementById('loading-overlay').style.display = 'none';
        return;
      }
      let profileDoc;
      try { profileDoc = await db.collection('users').doc(fbUser.uid).get(); }
      catch(netErr) {
        if (netErr.code !== 'unavailable') throw netErr;
        await new Promise(r => setTimeout(r, 2000));
        profileDoc = await db.collection('users').doc(fbUser.uid).get();
      }
      if (!profileDoc.exists || profileDoc.data().removed) { await auth.signOut(); return; }
      const p = profileDoc.data();
      currentUser = { id: fbUser.uid, username: p.username, email: p.email || fbUser.email, role: p.role };
      viewingUserId = null;

      // Load data in parallel
      await Promise.all([loadUserSettings(), loadAllCoaches()]);
      subscribeSessions();
      subscribeGroups();
      subscribePlayers();

      // Apply UI
      document.getElementById('loading-overlay').style.display = 'none';
      document.getElementById('main-nav').style.display = '';
      document.getElementById('sidebar-nav').style.display = '';
      document.getElementById('sidebar-username').textContent = currentUser?.username || '';
      // Show admin nav button
      document.querySelectorAll('.admin-only').forEach(el => {
        el.style.display = isAdmin() ? '' : 'none';
      });
      applyLangStrings();
      showScreen('calendar');
      logActivity('SESSION_RESUME', currentUser.username);
    } catch(e) {
      console.error('[CoachHours] Auth state error:', e);
      document.getElementById('loading-overlay').style.display = 'none';
      if (e.code === 'unavailable' || e.message?.includes('offline')) {
        document.getElementById('auth-error').textContent = t('connectionError');
        document.getElementById('auth-error').style.display = 'block';
      } else {
        await auth.signOut();
      }
    }
  } else {
    currentUser = null;
    if (sessionsUnsub) { sessionsUnsub(); sessionsUnsub = null; }
    if (groupsUnsub)   { groupsUnsub();   groupsUnsub = null; }
    if (playersUnsub)  { playersUnsub();  playersUnsub = null; }
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('main-nav').style.display = 'none';
    document.getElementById('sidebar-nav').style.display = 'none';
    document.getElementById('view-banner')?.remove();
    document.querySelector('.app')?.classList.remove('viewing');
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-auth').classList.add('active');
    applyLangStrings();
  }
});

// Apply lang on page load (before auth resolves)
applyLangStrings();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
