<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111111">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="שעות אימון">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/images/icon-192.png">
<title>שעות אימון</title>
<link rel="stylesheet" href="css/main.css">

</head>
<body>
<div class="app">

  <!-- ── AUTH SCREEN ── -->
  <div id="screen-auth" class="screen active" style="justify-content:center;align-items:center">
    <div style="width:100%;padding:40px 24px;max-width:400px">
      <div style="text-align:center;margin-bottom:32px">
        <div style="font-size:42px;margin-bottom:10px">🏃</div>
        <h1 style="font-size:26px;font-weight:600;letter-spacing:-0.5px" id="auth-title">שעות אימון</h1>
        <p style="font-size:14px;color:var(--text2);margin-top:6px" id="auth-subtitle">התחבר כדי להמשיך</p>
      </div>
      <div id="auth-error" class="error-box" style="margin-bottom:10px"></div>
      <div id="auth-success" class="success-box" style="margin-bottom:10px"></div>
      <div id="auth-name-row" style="display:none;margin-bottom:10px">
        <label class="form-label" id="lbl-fullname">שם מלא</label>
        <input type="text" id="auth-fullname" placeholder="השם המלא שלך" style="width:100%">
      </div>
      <div style="margin-bottom:10px">
        <label class="form-label" id="lbl-email">אימייל</label>
        <input type="email" id="auth-email" placeholder="כתובת אימייל" style="width:100%" dir="ltr">
      </div>
      <div style="margin-bottom:18px">
        <label class="form-label" id="lbl-password">סיסמה</label>
        <input type="password" id="auth-password" placeholder="סיסמה" style="width:100%" dir="ltr"
          onkeydown="if(event.key==='Enter')submitAuth()">
        <div id="auth-forgot-row" style="margin-top:6px;text-align:left">
          <button id="auth-forgot-btn" onclick="forgotPassword()" style="background:none;border:none;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;padding:0">שכחת סיסמה?</button>
        </div>
      </div>
      <button class="btn btn-primary" id="auth-submit-btn" onclick="submitAuth()" style="margin-top:0">התחבר</button>
      <button class="btn btn-secondary" id="auth-toggle-btn" style="margin-top:8px;font-size:13px" onclick="toggleAuthMode()">הרשמה כמאמן חדש</button>
      <button class="btn btn-secondary" id="auth-resend-btn" style="margin-top:8px;font-size:12px;display:none" onclick="resendVerification()">שלח שוב אימייל אימות</button>
    </div>
  </div>

  <!-- ── CALENDAR SCREEN ── -->
  <div id="screen-calendar" class="screen">
    <div class="header" style="padding-bottom:8px">
      <h1 id="app-header-title">שעות אימון</h1>
    </div>
    <div class="cal-toolbar">
      <div class="cal-toolbar-nav" style="position:relative">
        <div style="width:100%;display:flex;justify-content:center;align-items:center;gap:2px">
          <button class="cal-nav" onclick="calPrev()">‹</button>
          <span id="cal-title"></span>
          <button class="cal-nav" onclick="calNext()">›</button>
        </div>
        <button id="cal-today-chip" onclick="calJumpToday()" style="display:none;position:absolute;inset-inline-end:0;top:50%;transform:translateY(-50%);background:var(--bg3);border:0.5px solid var(--border2);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit;transition:opacity 0.15s"></button>
      </div>
      <div class="cal-toolbar-controls">
        <div class="cal-view-toggle">
          <button class="cal-view-btn active" id="cvb-month" onclick="setCalView('month')">חודש</button>
          <button class="cal-view-btn" id="cvb-week" onclick="setCalView('week')">שבוע</button>
          <button class="cal-view-btn" id="cvb-day" onclick="setCalView('day')">יום</button>
        </div>
        <button class="cal-add-btn admin-only" style="display:none" onclick="openSessionModal(null,null,null)" id="cal-add-btn">+ אימון</button>
      </div>
    </div>
    <div id="cal-today-strip"></div>
    <div id="cal-body"></div>
  </div>

  <!-- ── GROUPS SCREEN ── -->
  <div id="screen-groups" class="screen">
    <div class="header">
      <h1 id="groups-h1">שחקנים</h1>
      <p id="groups-subtitle">קבוצות ושחקנים פרטיים</p>
    </div>
    <div class="section-divider" id="groups-section-divider">קבוצות</div>
    <div id="groups-add-btn-row" style="padding:0 16px 4px;display:none">
      <button class="btn btn-primary" style="margin-top:0" id="groups-add-btn" onclick="openAddGroupModal()">+ קבוצה חדשה</button>
    </div>
    <div id="groups-list"></div>
    <div class="section-divider" id="individual-players-divider" style="margin-top:8px">שחקנים פרטיים</div>
    <div id="individual-players-add-row" style="padding:0 16px 4px;display:none">
      <button class="btn btn-secondary" style="margin-top:0" id="individual-add-btn" onclick="openAddIndividualPlayerModal()">+ שחקן חדש</button>
    </div>
    <div id="individual-players-list"></div>
  </div>

  <!-- ── SUMMARY SCREEN ── -->
  <div id="screen-summary" class="screen">
    <div class="header">
      <h1 id="summary-h1">סיכום</h1>
      <p id="summary-subtitle">שעות והכנסה</p>
    </div>
    <div id="summary-body"></div>
  </div>

  <!-- ── SETTINGS SCREEN ── -->
  <div id="screen-settings" class="screen">
    <div class="header">
      <h1 id="settings-h1">הגדרות</h1>
    </div>
    <div id="settings-body"></div>
  </div>

  <!-- ── ADMIN SCREEN ── -->
  <div id="screen-admin" class="screen">
    <div class="header">
      <h1 id="admin-h1">ניהול</h1>
      <p id="admin-subtitle">מאמנים ופעילות</p>
    </div>
    <div id="admin-body"></div>
  </div>

  <!-- SIDEBAR NAV (desktop only) -->
  <nav class="sidebar-nav" id="sidebar-nav" style="display:none">
    <div class="sidebar-logo">
      <span class="sidebar-logo-icon">🏃</span>
      <span class="sidebar-logo-name" id="sidebar-app-name">שעות אימון</span>
    </div>
    <div class="sidebar-items">
      <button class="sidebar-nav-btn active" id="snav-calendar" onclick="showScreen('calendar')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span id="snav-lbl-calendar">לוח שנה</span>
      </button>
      <button class="sidebar-nav-btn" id="snav-groups" onclick="showScreen('groups')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        <span id="snav-lbl-groups">שחקנים</span>
      </button>
      <button class="sidebar-nav-btn" id="snav-summary" onclick="showScreen('summary')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span id="snav-lbl-summary">סיכום</span>
      </button>
      <button class="sidebar-nav-btn" id="snav-settings" onclick="showScreen('settings')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span id="snav-lbl-settings">הגדרות</span>
      </button>
      <button class="sidebar-nav-btn admin-only" id="snav-admin" style="display:none" onclick="showScreen('admin')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span id="snav-lbl-admin">ניהול</span>
      </button>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-username" id="sidebar-username"></div>
    </div>
  </nav>

  <!-- BOTTOM NAV -->
  <nav class="nav" id="main-nav" style="display:none">
    <button class="nav-btn active" id="nav-calendar" onclick="showScreen('calendar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span id="nav-lbl-calendar">לוח שנה</span>
    </button>
    <button class="nav-btn" id="nav-groups" onclick="showScreen('groups')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      <span id="nav-lbl-groups">שחקנים</span>
    </button>
    <button class="nav-btn" id="nav-summary" onclick="showScreen('summary')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span id="nav-lbl-summary">סיכום</span>
    </button>
    <button class="nav-btn" id="nav-settings" onclick="showScreen('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span id="nav-lbl-settings">הגדרות</span>
    </button>
    <button class="nav-btn admin-only" id="nav-admin" style="display:none" onclick="showScreen('admin')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span id="nav-lbl-admin">ניהול</span>
    </button>
  </nav>

  <!-- LOADING OVERLAY -->
  <div id="loading-overlay" style="display:flex;position:fixed;inset:0;background:var(--bg);z-index:999;align-items:center;justify-content:center">
    <div id="loading-text" style="font-size:14px;color:var(--text2)">טוען…</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/modules/firebase.js"></script>
<script src="js/modules/state.js"></script>
<script src="js/modules/i18n.js"></script>
<script src="js/modules/utils.js"></script>
<script src="js/modules/data.js"></script>
<script src="js/modules/ui.js"></script>
<script src="js/modules/calendar.js"></script>
<script src="js/modules/sessions.js"></script>
<script src="js/modules/groups.js"></script>
<script src="js/modules/summary.js"></script>
<script src="js/modules/settings.js"></script>
<script src="js/modules/admin.js"></script>
<script src="js/modules/auth.js"></script>
<script src="js/main.js"></script>
</body>
</html>
